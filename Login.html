<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitCore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

  <div class="container">
    <div class="dark-card auth-card text-center p-4">
      <a href="index.html" class="brand-logo text-decoration-none d-block mb-3">FITCORE</a>
      
      <!-- Nav Pills for Toggling -->
      <ul class="nav nav-pills nav-justified mb-4" id="authTab" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="signin-tab" data-bs-toggle="pill" data-bs-target="#signin" type="button">Sign In</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signup" type="button">Create Account</button>
        </li>
      </ul>

      <div class="tab-content" id="authTabContent">
        <!-- Sign In -->
        <div class="tab-pane fade show active" id="signin">
          <form action="dashboard.html">
            <div class="text-start mb-3">
              <label class="form-label small text-secondary">USERNAME</label>
              <input type="text" class="form-control form-control-dark" placeholder="Enter your username" required>
            </div>
            <div class="text-start mb-3">
              <label class="form-label small text-secondary">PASSWORD</label>
              <input type="password" class="form-control form-control-dark" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-neon w-100 py-2 mt-2">SIGN IN</button>
          </form>
        </div>

        <!-- Create Account-->
        <div class="tab-pane fade" id="signup">
          <form action="dashboard.html">
            <div class="text-start mb-2">
              <label class="form-label small text-secondary">FULL NAME</label>
              <input type="text" class="form-control form-control-dark" placeholder="Your full name" required>
            </div>
            <div class="text-start mb-2">
              <label class="form-label small text-secondary">EMAIL</label>
              <input type="email" class="form-control form-control-dark" placeholder="your@email.com" required>
            </div>
            <div class="text-start mb-2">
              <label class="form-label small text-secondary">PASSWORD</label>
              <input type="password" class="form-control form-control-dark" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-neon w-100 py-2 mt-3">CREATE ACCOUNT</button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
